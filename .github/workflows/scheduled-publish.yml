name: Scheduled Publish

on:
  schedule:
    # UTC 11:00 = JST 20:00（毎日）
    - cron: '0 11 * * *'
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish scheduled articles
        run: |
          today=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          echo "Today (JST): $today"
          changed=false

          for file in articles/*.md; do
            [ -f "$file" ] || continue

            # scheduled_publish_date を抽出
            sched=$(grep -m1 '^scheduled_publish_date:' "$file" | sed 's/scheduled_publish_date: *"\?\([0-9-]*\)"\?/\1/')
            [ -z "$sched" ] && continue

            # published: false であることを確認
            is_draft=$(grep -m1 '^published:' "$file" | grep -c 'false' || true)
            [ "$is_draft" -eq 0 ] && continue

            # 日付比較（予定日 <= 今日なら公開）
            if [[ "$sched" < "$today" || "$sched" == "$today" ]]; then
              echo "Publishing: $file (scheduled: $sched)"
              sed -i 's/^published: false/published: true/' "$file"
              changed=true
            else
              echo "Not yet: $file (scheduled: $sched, today: $today)"
            fi
          done

          if [ "$changed" = true ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add articles/
            git commit -m "Scheduled publish: $today"
            git push
            echo "Published articles for $today"
          else
            echo "No articles to publish today"
          fi
